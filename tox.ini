[tox]
envlist = py{311,312,313}-test
isolated_build = true

[testenv]
extras = test
commands = pytest --pyargs rtlsdr_recorder {posargs}

[testenv:hardware]
description = run the tests that need a real RTL-SDR dongle plugged in
extras = test
commands = pytest --pyargs rtlsdr_recorder -m hardware {posargs}

[testenv:all]
description = run all tests, including those that need a real RTL-SDR dongle
extras = test
commands = pytest --pyargs rtlsdr_recorder -m "" {posargs}
